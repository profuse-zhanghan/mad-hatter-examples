name: CI Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-good:
    name: Build good/ (zero warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            good/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('good/Cargo.lock', 'good/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build good/ and check zero warnings
        working-directory: good
        run: |
          set -euo pipefail
          # Build and capture all output
          cargo build 2>&1 | tee /tmp/build.log
          # Check for any warning lines (Rust compiler + Guardian build script)
          if grep -q "^warning:" /tmp/build.log; then
            echo ""
            echo "========================================="
            echo "  BUILD FAILED: warnings detected"
            echo "========================================="
            echo ""
            grep "^warning:" /tmp/build.log
            exit 1
          fi
          echo ""
          echo "========================================="
          echo "  BUILD PASSED: zero warnings"
          echo "========================================="